# Copy this to config.yaml and fill in your values

bigquery:
  project_id: "your-gcp-project"
  dataset: "supply_ops"
  credentials_path: "path/to/service-account.json"  # For scheduled runs

churn:
  # Churn definitions (days without slot booking)
  threshold_active_days: 14
  threshold_newbie_days: 7
  # Newbie = < 30 days since hired
  newbie_max_tenure_days: 30
  # Prediction horizon
  prediction_window_days: 14

model:
  # Train/test split
  test_size: 0.2
  random_state: 42
  # Models to evaluate
  algorithms:
    - xgboost
    - lightgbm
    - random_forest

phase12:
  # Export-based baseline training inputs
  features_csv: "data/exports/churn_riders_features_8w_poland_2026_to_today.csv"
  snapshot_csv: "data/exports/churn_riders_snapshot_poland_2026_to_today.csv"

  # Validation and model selection
  use_forward_events: true
  horizon_weeks: 2
  max_event_offset: 6
  date_col: "event_week"
  test_size: 0.2
  random_state: 42
  selection_metric: "avg_precision"

  # Artifacts
  model_output_path: "models/phase12_churn_model.joblib"
  metrics_output_path: "models/phase12_metrics.json"

cities:
  - warsaw
  - kyiv
  # Add more cities as needed

slack:
  webhook_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
  channel: "#supply-ops-alerts"

dashboard:
  port: 8501
  title: "Rider Churn Early Warning System"
